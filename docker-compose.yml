version: '3.8'

services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    command:
      - redpanda start
      - --overprovisioned
      - --smp 1
      - --kafka-addr 0.0.0.0:9092
      - --advertise-kafka-addr redpanda:9092
    ports:
      - "9092:9092"

  app1:
    build: ./backend
    environment:
      - KAFKA_BOOTSTRAP=redpanda:9092
      - APP_HOST=app1
      - APP_PORT=8080
    depends_on:
      - redpanda

  app2:
    build: ./backend
    environment:
      - KAFKA_BOOTSTRAP=redpanda:9092
      - APP_HOST=app2
      - APP_PORT=8080
    depends_on:
      - redpanda

  app3:
    build: ./backend
    environment:
      - KAFKA_BOOTSTRAP=redpanda:9092
      - APP_HOST=app3
      - APP_PORT=8080
    depends_on:
      - redpanda

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8000:80"
    depends_on:
      - app1
      - app2
      - app3